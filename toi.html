  </div>
     <!--wrapper-->
  <div id="wrapper">
    <!--メイン-->
    <div id="main">
        <article>
        <h2>お問い合わせ</h2>
        <p class="lead">お気軽にお問い合わせください</p>
        <p>下記メールフォームをご記入いただき、「送信する」ボタンを押してください。</p>
        <p>「<span class="must">※</span>」は必須項目です。</p>
        <section>
          <h2>お問い合わせフォーム</h2>
          <form id="entry" onsubmit="showMessage(); return false;">         

            <dl>
              <dt>お名前 <span class="must">※</span></dt>
              <dd><input type="text" name="name" id="name" required></dd>
              <dt>マイクラ人狼PVPの評価</dt>
              <dd>
                <label><input type="radio" name="questionnaire" id="questionnaire1" value="つまらない">つまらない</label>
                <label><input type="radio" name="questionnaire" id="questionnaire2" value="普通">普通</label>
                <label><input type="radio" name="questionnaire" id="questionnaire3" value="楽しい">楽しい</label>
              </dd>
             
              <dt>お問い合わせ種別</dt>
              <dd>
                <label><input type="checkbox" name="category" id="category1" value="バグ報告">バグ報告</label>
                <label><input type="checkbox" name="category" id="category2" value="プレイヤーの問題報告">プレイヤーの問題報告</label>
                <label><input type="checkbox" name="category" id="category3" value="その他問い合わせ">その他問い合わせ</label>
              </dd>
              <dt>お問い合わせ内容</dt>
              <dd>
                <textarea name="detail" id="detail"></textarea>
              </dd>
            </dl>
            <p id="submit_button_cover_cover">
                <input type="submit" id="submit_button" value="送信する">
            </p>
          </form>
        </section>
      </article>
    </div>
  </div>

function showMessage() {
