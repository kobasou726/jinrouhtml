        <p>「人狼学園」は桜が咲き誇る春の学園を舞台とした広大なマップで大人数でのプレイにおすすめです。<br>
          このマップは外と学園内の二つに分かれており、外は高低差がほとんどなく障害物もないため短期戦が好きな人におすすめです。<br>
